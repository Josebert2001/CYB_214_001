kind = "web"
previewPath = "/"
title = "IoT Study App"
version = "1.0.0"
id = "artifacts/iot-study"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20430

[services.development]
run = "pnpm --filter @workspace/iot-study run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iot-study", "run", "build" ]
publicDir = "artifacts/iot-study/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20430"
BASE_PATH = "/"
